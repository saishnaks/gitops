{{- if .Values.drupalPg.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drupal-pg
  namespace: {{ .Release.Namespace }}
  labels:
    app: drupal-pg
spec:
  replicas: {{ .Values.drupalPg.replicaCount }}
  selector:
    matchLabels:
      app: drupal-pg
  template:
    metadata:
      labels:
        app: drupal-pg
    spec:
      containers:
        - name: drupal
          image: "{{ .Values.drupalPg.image.repository }}:{{ .Values.drupalPg.image.tag }}"
          imagePullPolicy: {{ .Values.drupalPg.image.pullPolicy }}
          ports:
            - containerPort: 80
          # Automates the settings.php injection to handle the /mydrupal subfolder
          
          env:
            - name: DRUPAL_DB_HOST
              value: {{ .Values.drupalPg.database.host | quote }}
            - name: DRUPAL_DB_USER
              value: {{ .Values.drupalPg.database.user | quote }}
            - name: DRUPAL_DB_PASSWORD
              value: {{ .Values.drupalPg.database.password | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: drupal-pg
  namespace: {{ .Release.Namespace }}
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: drupal-pg
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: drupal-pg-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.drupalPg.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.drupalPg.contextPath | quote }}
            pathType: Prefix
            backend:
              service:
                name: drupal-pg
                port:
                  number: 80
{{- end }}